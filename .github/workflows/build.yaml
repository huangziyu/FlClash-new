name: build

on:
  push:
    tags:
      - 'v*'
      - '!v*-uos*'

env:
  IS_STABLE: ${{ !contains(github.ref, '-') }}

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
          - platform: windows
            os: Windows-2022
            arch: amd64
          - platform: linux
            os: ubuntu-22.04
            arch: amd64
          - platform: macos
            os: macos-15-intel
            arch: amd64
          - platform: macos
            os: macos-latest
            arch: arm64
          # - platform: windows
          #   os: windows-11-arm
          #   arch: arm64

    steps:
      - name: Setup rust
        if: startsWith(matrix.os, 'windows-11-arm')
        run: |
          Invoke-WebRequest -Uri "https://win.rustup.rs/aarch64" -OutFile rustup-init.exe
          .\rustup-init.exe -y --default-toolchain stable
          $cargoPath = "$env:USERPROFILE\.cargo\bin"
          Add-Content $env:GITHUB_PATH $cargoPath

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android Signing
        if: startsWith(matrix.platform,'android')
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE }}
          SERVICE_JSON_RAW: ${{ secrets.SERVICE_JSON }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${SERVICE_JSON_RAW:-}" ]; then
            echo "SERVICE_JSON secret is missing." >&2
            exit 1
          fi

          if [ -n "${KEYSTORE_B64:-}" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > android/app/keystore.jks
          fi

          if echo "$SERVICE_JSON_RAW" | base64 --decode > android/app/google-services.json 2>/dev/null; then
            echo "google-services.json decoded from base64."
          else
            printf '%s' "$SERVICE_JSON_RAW" > android/app/google-services.json
            echo "google-services.json written from raw JSON."
          fi

          python -m json.tool android/app/google-services.json >/dev/null

          if [ -n "${KEY_ALIAS:-}" ]; then
            echo "keyAlias=$KEY_ALIAS" >> android/local.properties
          fi
          if [ -n "${STORE_PASSWORD:-}" ]; then
            echo "storePassword=$STORE_PASSWORD" >> android/local.properties
          fi
          if [ -n "${KEY_PASSWORD:-}" ]; then
            echo "keyPassword=$KEY_PASSWORD" >> android/local.properties
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: |
            core/go.sum

      - name: Setup Flutter
        if: ${{ !startsWith(matrix.os, 'windows-11-arm') }}
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.7
          cache: true

      - name: Setup Flutter With Other
        if: startsWith(matrix.os, 'windows-11-arm')
        uses: subosito/flutter-action@v2
        with:
          channel: master
          flutter-version: 3.35.7
          cache: true

      - name: Get Flutter Dependency
        run: |
          flutter --version
          flutter pub get

      - name: Setup
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: dart setup.dart ${{ matrix.platform }} ${{ matrix.arch && format('--arch {0}', matrix.arch) }} ${{ env.IS_STABLE == 'true' && '--env stable' || '' }}

      - name: Ensure Android split APK artifacts
        if: startsWith(matrix.platform, 'android')
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist

          if ls dist/*android-arm64-v8a.apk dist/*android-armeabi-v7a.apk dist/*android-x86_64.apk >/dev/null 2>&1; then
            echo "Split APK artifacts already exist in dist."
            exit 0
          fi

          echo "Split APK artifacts missing. Build split-per-abi APKs as fallback."
          flutter build apk --release --split-per-abi --dart-define-from-file=env.json

          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk "dist/FlClash-${version}-android-arm64-v8a.apk"
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk "dist/FlClash-${version}-android-armeabi-v7a.apk"
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk "dist/FlClash-${version}-android-x86_64.apk"

      - name: Fallback collect Android artifacts
        if: startsWith(matrix.platform, 'android')
        shell: pwsh
        run: |
          $distPath = "./dist"
          $distFiles = @()
          if (Test-Path $distPath) {
            $distFiles = Get-ChildItem $distPath -Recurse -File
          }

          if ($distFiles.Count -gt 0) {
            Write-Host "dist already has files, skip fallback collection."
            exit 0
          }

          $apkDir = "./build/app/outputs/flutter-apk"
          if (!(Test-Path $apkDir)) {
            Write-Host "No fallback apk directory found: $apkDir"
            exit 0
          }

          $apkFiles = Get-ChildItem $apkDir -Filter "*.apk" -File
          if ($apkFiles.Count -eq 0) {
            Write-Host "No apk files found in fallback directory."
            exit 0
          }

          New-Item -ItemType Directory -Force -Path $distPath | Out-Null
          foreach ($apk in $apkFiles) {
            Copy-Item $apk.FullName -Destination $distPath -Force
            Write-Host "Copied fallback artifact: $($apk.FullName)"
          }

      - name: Verify dist artifacts
        shell: pwsh
        run: |
          Write-Host "Workspace: $pwd"
          if (!(Test-Path "./dist")) {
            Write-Error "dist directory not found after setup.dart build."
            exit 1
          }

          $files = Get-ChildItem "./dist" -Recurse -File
          if ($files.Count -eq 0) {
            Write-Error "dist directory exists but contains no files."
            exit 1
          }

          Write-Host "dist file count: $($files.Count)"
          $files | Select-Object -First 200 | ForEach-Object { Write-Host $_.FullName }

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.platform }}${{ matrix.arch && format('-{0}', matrix.arch) }}
          path: ./dist
          if-no-files-found: error
          overwrite: true

  build-linux-arm64-uos:
    runs-on: ubuntu-24.04-arm
    container:
      image: arm64v8/debian:buster
      options: --user root
    env:
      FLUTTER_VERSION: 3.35.7
    steps:
      - name: Prepare Debian Buster container
        shell: sh
        run: |
          set -eu
          printf '%s\n' \
            'deb http://archive.debian.org/debian buster main contrib non-free' \
            'deb http://archive.debian.org/debian-security buster/updates main contrib non-free' \
            > /etc/apt/sources.list
          printf 'Acquire::Check-Valid-Until "false";\n' > /etc/apt/apt.conf.d/99no-check-valid-until
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            bash \
            ca-certificates \
            curl \
            wget \
            git \
            sudo \
            tar \
            xz-utils \
            zip \
            unzip \
            file \
            findutils \
            binutils \
            build-essential \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            dpkg-dev \
            fakeroot \
            python3 \
            libgtk-3-dev \
            libappindicator3-dev \
            libkeybinder-3.0-dev \
            libglu1-mesa
          rm -rf /var/lib/apt/lists/*

      - name: Configure git for public submodules
        shell: bash
        run: |
          set -euo pipefail
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Mark workspace safe
        shell: bash
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: |
            core/go.sum

      - name: Install Flutter inside Buster
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "$FLUTTER_VERSION" https://github.com/flutter/flutter.git /opt/flutter
          git config --global --add safe.directory /opt/flutter
          echo "/opt/flutter/bin" >> "$GITHUB_PATH"
          echo "/opt/flutter/bin/cache/dart-sdk/bin" >> "$GITHUB_PATH"
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
          /opt/flutter/bin/flutter config --no-analytics
          /opt/flutter/bin/flutter config --enable-linux-desktop
          /opt/flutter/bin/flutter precache --linux
          /opt/flutter/bin/flutter doctor -v

      - name: Get Flutter dependency
        shell: bash
        run: |
          set -euo pipefail
          flutter --version
          dart --version
          flutter pub get

      - name: Patch Linux dependency fallback for Buster
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('setup.dart')
          text = path.read_text()
          old = "Build.getExecutable('sudo apt install -y libayatana-appindicator3-dev')"
          new = "Build.getExecutable('sudo apt install -y libappindicator3-dev')"
          if old not in text:
              raise SystemExit('Expected libayatana dependency line was not found in setup.dart')
          path.write_text(text.replace(old, new))
          PY

      - name: Build UOS arm64 deb
        shell: bash
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          dart setup.dart linux --arch arm64 ${{ env.IS_STABLE == 'true' && '--env stable' || '' }}

      - name: Repack deb with xz compression
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t debs < <(find dist -type f -name '*.deb' -print)
          if [ "${#debs[@]}" -eq 0 ]; then
            echo "No .deb files found in dist."
            find dist -maxdepth 3 -type f -print || true
            exit 1
          fi

          for deb in "${debs[@]}"; do
            work="$(mktemp -d)"
            mkdir -p "$work/package"
            dpkg-deb -R "$deb" "$work/package"
            dpkg-deb -Zxz -z6 -b "$work/package" "$work/repacked.deb"
            mv "$work/repacked.deb" "$deb"
            rm -rf "$work"

            echo "Repacked $deb with xz compression"
            dpkg-deb -f "$deb" Package Version Architecture
            ar t "$deb"
            if ar t "$deb" | grep -q 'zst$'; then
              echo "$deb still contains zstd-compressed members."
              exit 1
            fi
          done

      - name: Verify GLIBC symbol ceiling
        shell: bash
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          mapfile -t debs < <(find dist -type f -name '*.deb' -print)
          for deb in "${debs[@]}"; do
            pkg_dir="$tmp/$(basename "$deb").root"
            mkdir -p "$pkg_dir"
            dpkg-deb -x "$deb" "$pkg_dir"
          done

          mapfile -t glibc_symbols < <(
            find "$tmp" -type f \( -perm /111 -o -name '*.so' -o -name '*.so.*' \) -print0 |
              xargs -0 -r strings |
              grep -ao 'GLIBC_[0-9]\+\.[0-9]\+' |
              sort -Vu || true
          )

          if [ "${#glibc_symbols[@]}" -eq 0 ]; then
            echo "No GLIBC versioned symbols found."
            exit 0
          fi

          printf '%s\n' "${glibc_symbols[@]}"
          max="$(printf '%s\n' "${glibc_symbols[@]}" | tail -n 1 | sed 's/^GLIBC_//')"
          echo "Maximum GLIBC symbol: GLIBC_${max}"

          if dpkg --compare-versions "$max" gt "2.28"; then
            echo "Found GLIBC_${max}, which is newer than UOS/Debian 10 glibc 2.28."
            exit 1
          fi

      - name: Verify dist artifacts
        shell: bash
        run: |
          set -euo pipefail
          find ./dist -maxdepth 3 -type f -print
          test -n "$(find ./dist -type f -name '*.deb' -print -quit)"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: artifact-linux-arm64
          path: ./dist
          if-no-files-found: error
          overwrite: true

  changelog:
    runs-on: ubuntu-latest
    needs: [ build, build-linux-arm64-uos ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        if: ${{ env.IS_STABLE == 'true' }}
        with:
          fetch-depth: 0
          ref: refs/heads/main

      - name: Generate
        if: ${{ env.IS_STABLE == 'true' }}
        run: |
          last_ver=$(grep -m1 '^## ' CHANGELOG.md 2>/dev/null | sed 's/^## //')

          tags=($(git tag --merged HEAD --sort=-creatordate))

          temp="NEW_CHANGELOG.md"
          : > "$temp"

          for i in "${!tags[@]}"; do
              curr="${tags[i]}"
              [[ "$curr" == "$last_ver" ]] && break

              prev="${tags[i+1]}"
              range="${prev:+$prev..}$curr"

              echo -e "## $curr\n" >> "$temp"
              git log --no-merges --pretty=format:"%s" "$range" | \
              awk '!/Update changelog/ && !/Co-authored-by:/ && !/cursoragent@cursor.com/ && NF {print "- " $0 "\n"}' >> "$temp"
          done
          [ -f CHANGELOG.md ] && cat CHANGELOG.md >> "$temp"

          mv "$temp" CHANGELOG.md

      - name: Commit
        if: ${{ env.IS_STABLE == 'true' }}
        run: |
          git add CHANGELOG.md
          if ! git diff --cached --quiet; then
            echo "Commit pushing"
            git config --local user.email "chen08209@gmail.com"
            git config --local user.name "chen08209"
            git commit -m "Update changelog"
            git push
            if [ $? -eq 0 ]; then
              echo "Push succeeded"
            else
              echo "Push failed"
              exit 1
            fi
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload:
    permissions: write-all
    needs: [ build, build-linux-arm64-uos ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download
        uses: actions/download-artifact@v4
        with:
          path: ./dist/
          pattern: artifact-*
          merge-multiple: true

      - name: Generate release.md
        run: |
          currentTag="${{ github.ref_name }}"
          preTag=$(git tag --merged "$currentTag" --sort=-v:refname | sed -n '2p')
          out="release.md"
          : > "$out"

          range="$currentTag"
          if [ -n "$preTag" ]; then
            range="$preTag..$currentTag"
          fi

          git log --first-parent --no-merges --pretty=format:"%s" "$range" | \
            awk '!/Update changelog/ && !/Co-authored-by:/ && !/cursoragent@cursor.com/ && NF {print "- " $0}' >> "$out"

          if [ ! -s "$out" ]; then
            echo "- Maintenance release." >> "$out"
          fi

      - name: Normalize artifact filenames by tag version
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          shopt -s nullglob
          for file in ./dist/FlClash-*; do
            base="$(basename "$file")"
            normalized="$(echo "$base" | sed -E "s/^FlClash-[0-9]+(\.[0-9]+){1,3}/FlClash-${version}/")"
            if [ "$base" != "$normalized" ]; then
              rm -f "./dist/${normalized}"
              mv "$file" "./dist/${normalized}"
              echo "Renamed ${base} -> ${normalized}"
            fi
          done

      - name: Patch release.md
        run: |
          version=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          sed -e "s|VERSION|$version|g" -e "s|REPO|${GITHUB_REPOSITORY}|g" ./.github/release_template.md >> release.md

      - name: Generate sha256
        if: env.IS_STABLE == 'true'
        run: |
          cd ./dist
          for file in $(find . -type f -not -name "*.sha256"); do
            sha256sum "$file" > "${file}.sha256"
          done

      - name: Release
        if: ${{ env.IS_STABLE == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*
          body_path: './release.md'

      - name: Create Fdroid Source Dir
        if: ${{ env.IS_STABLE == 'true' }}
        run: |
          mkdir -p ./tmp
          cp ./dist/*android-arm64-v8a* ./tmp/ || true
          echo "Files copied successfully"
