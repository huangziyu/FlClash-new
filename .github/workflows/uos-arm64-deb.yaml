name: build-uos-arm64-deb

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version label to embed in the build, for example v0.8.92-uos-test3
        required: false
        default: v0.8.92-uos-manual
  push:
    branches:
      - main
    paths:
      - '.github/workflows/uos-arm64-deb.yaml'
    tags:
      - 'v*-uos*'

env:
  FLUTTER_VERSION: 3.35.7
  BUILD_VERSION: ${{ github.event.inputs.version || (github.ref_type == 'tag' && github.ref_name) || 'v0.8.92-uos-auto' }}

jobs:
  build-uos-arm64-deb:
    name: Build UOS arm64 deb on Debian Buster
    runs-on: ubuntu-24.04-arm
    container:
      image: arm64v8/debian:buster
      options: --user root

    steps:
      - name: Prepare Debian Buster container
        shell: sh
        run: |
          set -eu
          printf '%s\n' \
            'deb http://archive.debian.org/debian buster main contrib non-free' \
            'deb http://archive.debian.org/debian-security buster/updates main contrib non-free' \
            'deb http://archive.debian.org/debian buster-backports main contrib non-free' \
            > /etc/apt/sources.list
          printf 'Acquire::Check-Valid-Until "false";\n' > /etc/apt/apt.conf.d/99no-check-valid-until
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            bash \
            ca-certificates \
            curl \
            wget \
            git \
            sudo \
            tar \
            xz-utils \
            zip \
            unzip \
            file \
            findutils \
            binutils \
            build-essential \
            clang \
            ninja-build \
            pkg-config \
            dpkg-dev \
            fakeroot \
            python3 \
            libgtk-3-dev \
            libappindicator3-dev \
            libkeybinder-3.0-dev \
            libglu1-mesa
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends -t buster-backports cmake
          cmake --version
          rm -rf /var/lib/apt/lists/*

      - name: Configure git for public submodules
        shell: bash
        run: |
          set -euo pipefail
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Mark workspace safe
        shell: bash
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: |
            core/go.sum

      - name: Install Flutter inside Buster
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "$FLUTTER_VERSION" https://github.com/flutter/flutter.git /opt/flutter
          git config --global --add safe.directory /opt/flutter
          echo "/opt/flutter/bin" >> "$GITHUB_PATH"
          echo "/opt/flutter/bin/cache/dart-sdk/bin" >> "$GITHUB_PATH"
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
          /opt/flutter/bin/flutter config --no-analytics
          /opt/flutter/bin/flutter config --enable-linux-desktop
          /opt/flutter/bin/flutter precache --linux
          /opt/flutter/bin/flutter doctor -v || true

      - name: Patch CI-only Buster dependency fallbacks
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          pubspec = Path('pubspec.yaml')
          text = pubspec.read_text()
          old = "  yaml_writer:\n    git:\n      url: https://github.com/chen08209/yaml_writer\n      ref: master\n"
          new = "  yaml_writer: ^2.1.0\n"
          if old not in text:
              raise SystemExit('Expected yaml_writer git dependency was not found in pubspec.yaml')
          pubspec.write_text(text.replace(old, new))

          lock = Path('pubspec.lock')
          if lock.exists():
              lock.unlink()

          setup = Path('setup.dart')
          setup_text = setup.read_text()
          old_dep = "Build.getExecutable('sudo apt install -y libayatana-appindicator3-dev')"
          new_dep = "Build.getExecutable('sudo apt install -y libappindicator3-dev')"
          if old_dep not in setup_text:
              raise SystemExit('Expected libayatana dependency line was not found in setup.dart')
          setup.write_text(setup_text.replace(old_dep, new_dep))
          PY

      - name: Get Flutter dependency
        shell: bash
        run: |
          set -euo pipefail
          flutter --version
          dart --version
          flutter pub get

      - name: Build UOS arm64 deb
        shell: bash
        env:
          RELEASE_VERSION: ${{ env.BUILD_VERSION }}
        run: |
          set -euo pipefail
          dart setup.dart linux --arch arm64

      - name: Repack deb with xz compression
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t debs < <(find dist -type f -name '*.deb' -print)
          if [ "${#debs[@]}" -eq 0 ]; then
            echo "No .deb files found in dist."
            find dist -maxdepth 3 -type f -print || true
            exit 1
          fi

          for deb in "${debs[@]}"; do
            work="$(mktemp -d)"
            mkdir -p "$work/package"
            dpkg-deb -R "$deb" "$work/package"
            dpkg-deb -Zxz -z6 -b "$work/package" "$work/repacked.deb"
            mv "$work/repacked.deb" "$deb"
            rm -rf "$work"

            echo "Repacked $deb with xz compression"
            dpkg-deb -f "$deb" Package Version Architecture
            ar t "$deb"
            if ar t "$deb" | grep -q 'zst$'; then
              echo "$deb still contains zstd-compressed members."
              exit 1
            fi
          done

      - name: Verify GLIBC symbol ceiling
        shell: bash
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          mapfile -t debs < <(find dist -type f -name '*.deb' -print)
          for deb in "${debs[@]}"; do
            pkg_dir="$tmp/$(basename "$deb").root"
            mkdir -p "$pkg_dir"
            dpkg-deb -x "$deb" "$pkg_dir"
          done

          mapfile -t glibc_symbols < <(
            find "$tmp" -type f \( -perm /111 -o -name '*.so' -o -name '*.so.*' \) -print0 |
              xargs -0 -r strings |
              grep -ao 'GLIBC_[0-9]\+\.[0-9]\+' |
              sort -Vu || true
          )

          if [ "${#glibc_symbols[@]}" -eq 0 ]; then
            echo "No GLIBC versioned symbols found."
            exit 0
          fi

          printf '%s\n' "${glibc_symbols[@]}"
          max="$(printf '%s\n' "${glibc_symbols[@]}" | tail -n 1 | sed 's/^GLIBC_//')"
          echo "Maximum GLIBC symbol: GLIBC_${max}"

          if dpkg --compare-versions "$max" gt "2.28"; then
            echo "Found GLIBC_${max}, which is newer than UOS/Debian 10 glibc 2.28."
            exit 1
          fi

      - name: Verify dist artifacts
        shell: bash
        run: |
          set -euo pipefail
          find ./dist -maxdepth 3 -type f -print
          test -n "$(find ./dist -type f -name '*.deb' -print -quit)"

      - name: Upload UOS arm64 deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlClash-uos-arm64-deb
          path: ./dist/**/*.deb
          if-no-files-found: error
          overwrite: true
